name: rahhal_flutter
description: "رحّال AI — مساعدك الذكي للسفر. AI-powered travel planner."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

  # Local Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_app_check: ^0.3.1+4

  # HTTP / AI
  dio: ^5.8.0+1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI & Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.2

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Dependency Injection
  get_it: ^8.0.3

  # Utilities
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.3.4
  permission_handler: ^11.4.0
  geolocator: ^13.0.3
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  dartz: ^0.10.1
  sqflite_common_ffi_web: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/lottie/

  # Fonts are loaded via Google Fonts package (no local fonts needed)
